# colossus.yaml — generated by scaffolder, read by deploy agents.
# Do not delete. The deploy agents use this instead of framework auto-detection.
# {{IMAGE_NAME}} is a placeholder substituted by the deploy agent at build time.
# Single container: Express (server/) serves the compiled Angular SPA (web/frontend/)
# on port 8080. Root Dockerfile does the multi-stage build; no external nginx.
framework: docker
outputDir: ""
baseHref: "/{{IMAGE_NAME}}/"
port: 8080
nginx: none
